<a class="group relative block overflow-hidden rounded-xl border border-slate-200/80 bg-white/75 p-5 shadow-sm transition-all duration-300 hover:-translate-y-1 hover:border-cyan-500/50 hover:bg-white dark:border-slate-700/80 dark:bg-slate-800/40 dark:hover:border-cyan-300/50 dark:hover:bg-slate-800/60" href="{{ .RelPermalink }}">
  {{ if not .Date.IsZero }}
    <time class="mb-2 block font-mono text-xs text-slate-500 dark:text-slate-500" datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006-01-02" }}</time>
  {{ end }}
  <h3 class="mb-2 text-lg font-semibold text-slate-900 transition-colors group-hover:text-cyan-700 dark:text-slate-200 dark:group-hover:text-cyan-300">{{ .Title }}</h3>
  {{ with .Summary }}<p class="mb-4 line-clamp-2 text-sm leading-6 text-slate-600 dark:text-slate-400">{{ . | plainify }}</p>{{ end }}
  {{ with .Params.tags }}
    <div class="flex flex-wrap gap-2">
      {{ range first 3 . }}
        <span class="rounded bg-cyan-100 px-2 py-0.5 font-mono text-[10px] text-cyan-700 dark:bg-cyan-300/10 dark:text-cyan-300">#{{ . }}</span>
      {{ end }}
    </div>
  {{ end }}
</a>
