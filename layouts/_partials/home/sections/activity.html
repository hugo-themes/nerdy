<section class="mb-4 mt-8" id="{{ .id }}">
  {{ partial "components/section-heading.html" (dict "icon" .icon "title" .title "prefix" "<<" "suffix" ">>") }}
  <div class="relative ml-2 space-y-6 border-l-2 border-slate-300 pl-6 dark:border-slate-700">
    {{ range .items }}
      <article class="relative">
        {{ if .active }}
          <span class="absolute -left-[31px] top-1.5 h-3 w-3 rounded-full bg-accent-emerald shadow-[0_0_10px_rgba(16,185,129,0.75)]"></span>
        {{ else }}
          <span class="absolute -left-[31px] top-1.5 h-3 w-3 rounded-full border border-slate-400 bg-slate-300 dark:bg-slate-600"></span>
        {{ end }}
        <time class="rounded border border-slate-200 bg-white/80 px-2 py-0.5 font-mono text-xs nerdy-muted-soft dark:border-slate-700 dark:bg-slate-800">{{ .date }}</time>
        <p class="mt-2 text-sm leading-6 text-slate-700 dark:text-slate-300">{{ .html | safeHTML }}</p>
      </article>
    {{ end }}
  </div>
</section>
