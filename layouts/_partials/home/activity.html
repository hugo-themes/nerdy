<section class="mb-4 mt-8" id="{{ .id }}">
  {{ partial "home/section-heading.html" . }}
  <div class="relative ml-2 space-y-6 border-l-2 border-slate-700 pl-6">
    {{ range .items }}
      <article class="relative">
        {{ if .active }}
          <span class="absolute -left-[31px] top-1.5 h-3 w-3 rounded-full bg-emerald-300 shadow-[0_0_10px_rgba(110,231,183,0.95)]"></span>
        {{ else }}
          <span class="absolute -left-[31px] top-1.5 h-3 w-3 rounded-full border border-slate-400 bg-slate-600"></span>
        {{ end }}
        <time class="rounded border border-slate-700 bg-slate-800 px-2 py-0.5 font-mono text-xs text-slate-500">{{ .date }}</time>
        <p class="mt-2 text-sm leading-6 text-slate-300">{{ .html | safeHTML }}</p>
      </article>
    {{ end }}
  </div>
</section>
