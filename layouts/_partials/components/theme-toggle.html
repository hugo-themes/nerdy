{{- $variant := .variant | default "icon" -}}
{{- $class := .class | default "" -}}

{{- if eq $variant "button" -}}
  <button class="group nerdy-button flex w-full items-center justify-center gap-2 {{ $class }}" type="button" aria-label="Toggle theme" aria-pressed="false" x-on:click="toggle()" x-bind:aria-pressed="dark.toString()" x-bind:aria-label="dark ? 'Switch to light mode' : 'Switch to dark mode'">
    <span class="transition-colors group-hover:text-accent-cyan" x-show="dark" x-cloak>{{ partial "components/icon.html" (dict "name" "moon" "class" "h-4 w-4") }}</span>
    <span class="transition-colors group-hover:text-accent-amber" x-show="!dark" x-cloak>{{ partial "components/icon.html" (dict "name" "sun" "class" "h-4 w-4") }}</span>
    <span x-text="dark ? 'Switch to Light Mode' : 'Switch to Dark Mode'">Switch to Light Mode</span>
  </button>
{{- else -}}
  <button class="nerdy-icon-button {{ $class }}" type="button" aria-label="Toggle theme" aria-pressed="false" x-on:click="toggle()" x-bind:aria-pressed="dark.toString()" x-bind:aria-label="dark ? 'Switch to light mode' : 'Switch to dark mode'">
    <span x-show="dark" x-cloak>{{ partial "components/icon.html" (dict "name" "moon" "class" "h-4 w-4") }}</span>
    <span x-show="!dark" x-cloak>{{ partial "components/icon.html" (dict "name" "sun" "class" "h-4 w-4") }}</span>
  </button>
{{- end -}}
