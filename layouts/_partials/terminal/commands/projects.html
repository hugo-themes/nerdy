<pre class="font-mono whitespace-pre-wrap leading-relaxed">{{ range $index, $project := .items }}<span class="text-pink-400">{{ add $index 1 }}.</span> <span class="font-bold text-[#3B8EEA]">{{ $project.name }}</span>
   <span class="text-cyan-400">Tech:</span> {{ delimit $project.tech ", " }}
   <span class="text-cyan-400">Desc:</span> {{ $project.description }}
   <span class="text-cyan-400">Link:</span> <a class="pointer-events-auto relative z-50 text-blue-400 underline hover:text-blue-300" href="{{ $project.url | safeURL }}" target="_blank" rel="noopener noreferrer">{{ $project.url }}</a>

{{ end }}</pre>
