{{ define "main" }}
  <div class="mx-auto max-w-4xl">
    {{ partial "components/page-heading.html" (dict "title" .Title "description" .Description "eyebrow" "~/page" "accent" "cyan") }}

    <article class="nerdy-card p-5 sm:p-8">
      <div class="nerdy-prose prose prose-slate max-w-none dark:prose-invert">
        {{ .Content }}
      </div>
    </article>
  </div>
{{ end }}
