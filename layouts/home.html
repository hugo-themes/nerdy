{{ define "main" }}
  {{ $home := hugo.Data.home }}

  <div class="nerdy-page-surface nerdy-page-surface--home">
    <div class="nerdy-ambient-bg"></div>
    <div class="nerdy-top-glow"></div>

    <div class="nerdy-container pt-12 lg:pt-20">
      <div class="grid grid-cols-1 items-start gap-8 lg:grid-cols-12 lg:gap-12">
        {{ partial "home/sidebar.html" . }}

        <div class="flex flex-col gap-8 lg:col-span-8">
          {{ partial "terminal.html" . }}

          {{ range $home.sections }}
            {{ partial "home/main-section.html" . }}
          {{ end }}
        </div>
      </div>
    </div>
  </div>
{{ end }}
