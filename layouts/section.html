{{ define "main" }}
  <header class="mb-8">
    <h1 class="text-3xl font-bold tracking-tight">{{ .Title }}</h1>
    {{ with .Description }}<p class="mt-2 text-muted-foreground">{{ . }}</p>{{ end }}
  </header>
  <div class="grid gap-4">
    {{ range .Pages }}
      <a class="group nerdy-card nerdy-card-hover nerdy-card-accent-cyan p-5 text-card-foreground" href="{{ .RelPermalink }}">
        <h2 class="text-xl font-semibold">{{ .Title }}</h2>
        {{ with .Summary }}<p class="mt-2 text-muted-foreground">{{ . }}</p>{{ end }}
      </a>
    {{ end }}
  </div>
{{ end }}
